services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: tianditu-api
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3000
      UPLOAD_DIR: /app/uploads
      SHARE_DIR: /app/share
      SKILLS_DIR: /app/skills
      THUMBNAIL_CHROMIUM_PATH: /usr/bin/chromium
    volumes:
      - api_uploads:/app/uploads
      - api_share:/app/share
      - api_run_dossiers:/app/run-dossiers
    networks:
      - tianditu_net

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tianditu-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    networks:
      - tianditu_net

volumes:
  api_uploads:
  api_share:
  api_run_dossiers:

networks:
  tianditu_net:
    driver: bridge
