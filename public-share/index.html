<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京市中心地图</title>
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://api.tianditu.gov.cn/api/v5/js?tk=4043dde46add842282bacc412299311d"></script>
    <script>
        var map = new TMapGL.Map("map", {
            center: [116.40, 39.90],
            zoom: 12,
            pitch: 0,
            bearing: 0
        });

        map.on("load", function() {
            map.addControl(new TMapGL.NavigationControl(), "top-right");
            map.addControl(new TMapGL.ScaleControl(), "bottom-left");
            map.addControl(new TMapGL.FullscreenControl(), "top-right");
        });
    </script>
</body>
</html>
