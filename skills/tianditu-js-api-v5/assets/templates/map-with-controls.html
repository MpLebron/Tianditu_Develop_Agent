<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>带控件的地图</title>
    <style>
        html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://api.tianditu.gov.cn/api/v5/js?tk=${TIANDITU_TOKEN}" type="text/javascript"></script>
    <script>
        var map = new TMapGL.Map("map", {
            center: [116.40, 39.90],
            zoom: 12
        });

        map.on("load", function() {
            // 导航控件（缩放+指南针+俯仰）
            map.addControl(new TMapGL.NavigationControl({
                showZoom: true,
                showCompass: true,
                visualizePitch: true
            }), "top-right");

            // 全屏控件
            map.addControl(new TMapGL.FullscreenControl(), "top-right");

            // 比例尺
            map.addControl(new TMapGL.ScaleControl({
                maxWidth: 100,
                unit: "metric"
            }), "bottom-left");
        });
    </script>
</body>
</html>
