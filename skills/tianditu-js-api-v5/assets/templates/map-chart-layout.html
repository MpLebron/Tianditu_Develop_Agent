<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地图+图表联动</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; display: flex; }
        #map { width: 60%; height: 100%; }
        #chart-container {
            width: 40%; height: 100%;
            display: flex; flex-direction: column;
            background: #f5f5f5;
        }
        .chart-title {
            font-size: 14px; font-weight: bold;
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid #eee;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .chart-panel { flex: 1; padding: 10px; }
        #chart { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="chart-container">
        <div class="chart-title">点击地图标记查看详细数据</div>
        <div class="chart-panel">
            <div id="chart"></div>
        </div>
    </div>
    <script src="https://api.tianditu.gov.cn/api/v5/js?tk=${TIANDITU_TOKEN}" type="text/javascript"></script>
    <script>
        // === 数据 ===
        var locationData = [
            // { name: '...', coordinates: [lng, lat], color: '#hex', chartData: { categories: [...], values: [...] } }
        ];

        // === 初始化 ===
        var map = new TMapGL.Map("map", { center: [116.40, 39.90], zoom: 5 });
        var myChart = echarts.init(document.getElementById("chart"));

        map.on("load", function() {
            map.addControl(new TMapGL.NavigationControl(), "top-right");

            locationData.forEach(function(loc) {
                var el = document.createElement("div");
                el.style.cssText = "width:24px;height:24px;border-radius:50%;background:" + loc.color + ";border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);cursor:pointer;";
                new TMapGL.Marker({ element: el }).setLngLat(loc.coordinates).addTo(map);
                el.addEventListener("click", function(e) { e.stopPropagation(); updateChart(loc); });
            });

            if (locationData.length > 0) updateChart(locationData[0]);
        });

        function updateChart(data) {
            document.querySelector(".chart-title").textContent = data.name + " 详细数据";
            myChart.setOption({
                tooltip: { trigger: "axis" },
                xAxis: { type: "category", data: data.chartData.categories },
                yAxis: { type: "value" },
                series: [{ name: data.name, data: data.chartData.values, type: "bar", itemStyle: { color: data.color } }]
            }, true);
        }

        window.addEventListener("resize", function() { myChart.resize(); });
    </script>
</body>
</html>
