<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索结果地图</title>
    <style>
        html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }
        .info-box {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 12px 16px; border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .info-box h3 { margin: 0 0 4px; font-size: 15px; color: #333; }
        .info-box p { margin: 0; color: #666; font-size: 13px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info-box">
        <h3>搜索结果</h3>
        <p id="result-count">加载中...</p>
    </div>
    <script src="https://api.tianditu.gov.cn/api/v5/js?tk=${TIANDITU_TOKEN}" type="text/javascript"></script>
    <script>
        var map = new TMapGL.Map("map", { center: [116.40, 39.90], zoom: 12 });

        // === POI 数据（从后端获取）===
        var poiData = [
            // { name: '...', lonlat: 'lng,lat', address: '...' }
        ];

        map.on("load", function() {
            map.addControl(new TMapGL.NavigationControl(), "top-right");
            map.addControl(new TMapGL.ScaleControl({ unit: "metric" }), "bottom-left");

            var bounds = new TMapGL.LngLatBounds();
            var hasBoundsPoint = false;

            poiData.forEach(function(poi) {
                var coords = poi.lonlat.split(",");
                var lng = parseFloat(coords[0]);
                var lat = parseFloat(coords[1]);
                if (!Number.isFinite(lng) || !Number.isFinite(lat)) return;
                bounds.extend([lng, lat]);
                hasBoundsPoint = true;

                var el = document.createElement("div");
                el.style.backgroundImage = "url(http://lbs.tianditu.gov.cn/js-api-v5-portal/image/marker.png)";
                el.style.width = "37px";
                el.style.height = "33px";
                el.style.cursor = "pointer";
                el.title = poi.name;

                var marker = new TMapGL.Marker({ element: el })
                    .setLngLat([lng, lat]).addTo(map);

                var popup = new TMapGL.Popup({ offset: [0, -30] })
                    .setHTML("<b>" + poi.name + "</b><br><span style='color:#666;font-size:12px;'>" + (poi.address || "") + "</span>");

                el.addEventListener("click", function() { popup.setLngLat([lng, lat]).addTo(map); });
            });

            document.getElementById("result-count").textContent = "共 " + poiData.length + " 个结果";

            if (hasBoundsPoint && poiData.length > 1) map.fitBounds(bounds, { padding: 50 });
        });
    </script>
</body>
</html>
