<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旧村改造地块可视化</title>
    <script src="https://api.tianditu.gov.cn/api/v5/js?tk=4043dde46add842282bacc412299311d"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-page: #f5f7fb;
            --bg-card: #ffffff;
            --text-primary: #16213a;
            --text-secondary: #5b6780;
            --text-muted: #8a95ab;
            --brand-500: #2f6bff;
            --brand-600: #2558d9;
            --brand-100: #e8f0ff;
            --success-500: #12a150;
            --warning-500: #e08a00;
            --danger-500: #d9363e;
            --border-soft: #e3e8f2;
            --shadow-card: 0 8px 24px rgba(22, 33, 58, 0.08);
            --radius-card: 16px;
            --radius-control: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-page);
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 地图区域 */
        #map {
            flex: 1;
            height: 100%;
            position: relative;
        }

        /* 侧边面板 */
        .side-panel {
            width: 400px;
            height: 100%;
            background: var(--bg-card);
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-soft);
            background: linear-gradient(135deg, var(--brand-500), var(--brand-600));
            color: white;
        }

        .panel-header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .panel-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-page);
            border-radius: var(--radius-control);
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border-soft);
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: var(--brand-500);
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .stat-card.success .value { color: var(--success-500); }
        .stat-card.warning .value { color: var(--warning-500); }
        .stat-card.danger .value { color: var(--danger-500); }

        /* 图表容器 */
        .chart-section {
            margin-bottom: 24px;
        }

        .chart-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            padding-left: 12px;
            border-left: 3px solid var(--brand-500);
        }

        .chart-container {
            height: 200px;
            background: var(--bg-page);
            border-radius: var(--radius-control);
            padding: 12px;
        }

        /* 图例 */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            padding: 16px;
            background: var(--bg-page);
            border-radius: var(--radius-control);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 2px solid rgba(0,0,0,0.1);
        }

        /* 加载状态 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-soft);
            border-top-color: var(--brand-500);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 错误状态 */
        .error-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--danger-500);
        }

        .retry-btn {
            margin-top: 16px;
            padding: 10px 24px;
            background: var(--brand-500);
            color: white;
            border: none;
            border-radius: var(--radius-control);
            cursor: pointer;
            font-size: 14px;
        }

        .retry-btn:hover {
            background: var(--brand-600);
        }

        /* 弹窗样式 */
        .popup-content {
            max-width: 280px;
            font-size: 13px;
        }

        .popup-content h4 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-soft);
        }

        .popup-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed var(--border-soft);
        }

        .popup-row:last-child {
            border-bottom: none;
        }

        .popup-label {
            color: var(--text-muted);
        }

        .popup-value {
            color: var(--text-primary);
            font-weight: 500;
            text-align: right;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
            .side-panel {
                width: 100%;
                height: 50%;
                order: 2;
            }
            #map {
                height: 50%;
                order: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="map">
            <div class="loading-overlay" id="loading">
                <div class="loading-spinner"></div>
            </div>
        </div>
        <div class="side-panel">
            <div class="panel-header">
                <h1>🏘️ 旧村改造地块管理</h1>
                <p>共 <span id="total-count">-</span> 个地块</p>
            </div>
            <div class="panel-content" id="panel-content">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>

    <script>
        // 数据文件 URL（必须原样使用用户上传的文件链接）
        const DATA_URL = '/share-assets/mmc2cn0o-861f308b85/assets/asset-1.geojson';

        // 状态管理
        let state = 'loading'; // loading / ready / empty / error
        let geojsonData = null;
        var map = null;
        let myChart1 = null;
        let myChart2 = null;

        // 颜色常量（提升为全局或在多处复用）
        const SIGNED_COLOR = 'rgba(18, 161, 80, 0.6)';    // 已签约 - 绿色
        const UNSIGNED_COLOR = 'rgba(47, 107, 255, 0.4)';  // 未签约 - 蓝色
        const UNKNOWN_COLOR = 'rgba(138, 149, 171, 0.4)';  // 未知 - 灰色

        // 初始化地图
        function initMap() {
            map = new TMapGL.Map('map', {
                center: [113.60, 23.54],
                zoom: 15,
                pitch: 0,
                bearing: 0
            });

            map.on('load', function() {
                // 添加控件
                map.addControl(new TMapGL.NavigationControl(), 'top-right');
                map.addControl(new TMapGL.ScaleControl(), 'bottom-left');
                map.addControl(new TMapGL.FullscreenControl(), 'top-right');

                // 加载数据
                loadData();
            });
        }

        // 加载数据
        function loadData() {
            setState('loading');
            fetch(DATA_URL)
                .then(function(res) {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(function(rawData) {
                    // 根据文件上下文，数据是标准 GeoJSON FeatureCollection
                    // 如果 rawData.data 存在则提取，否则直接使用
                    geojsonData = rawData.data || rawData;
                    
                    if (!geojsonData || !geojsonData.features || geojsonData.features.length === 0) {
                        setState('empty');
                        return;
                    }

                    renderMapLayers(geojsonData);
                    renderPanel(geojsonData);
                    setState('ready');
                })
                .catch(function(err) {
                    console.error('加载失败:', err);
                    setState('error');
                });
        }

        // 设置状态
        function setState(newState) {
            state = newState;
            const loadingEl = document.getElementById('loading');
            const panelContent = document.getElementById('panel-content');

            if (newState === 'loading') {
                loadingEl.style.display = 'flex';
            } else {
                loadingEl.style.display = 'none';
            }

            if (newState === 'empty') {
                panelContent.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                        </svg>
                        <p>暂无数据</p>
                    </div>
                `;
            } else if (newState === 'error') {
                panelContent.innerHTML = `
                    <div class="error-state">
                        <svg viewBox="0 0 24 24" fill="currentColor" style="color: var(--danger-500)">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                        </svg>
                        <p>数据加载失败</p>
                        <button class="retry-btn" onclick="loadData()">重试</button>
                    </div>
                `;
            }
        }

        // 渲染地图图层
        function renderMapLayers(geojson) {
            // 添加数据源
            map.addSource('village-data', {
                type: 'geojson',
                data: geojson
            });

            // 面填充图层
            map.addLayer({
                id: 'village-fill',
                type: 'fill',
                source: 'village-data',
                paint: {
                    'fill-color': [
                        'match',
                        ['get', '签约情'],
                        '已签约', SIGNED_COLOR,
                        '未签约', UNSIGNED_COLOR,
                        UNKNOWN_COLOR
                    ],
                    'fill-outline-color': 'rgba(255,255,255,0.8)',
                    'fill-opacity': 0.7
                }
            });

            // 边界线图层
            map.addLayer({
                id: 'village-line',
                type: 'line',
                source: 'village-data',
                paint: {
                    'line-color': '#ffffff',
                    'line-width': 1.5,
                    'line-opacity': 0.9
                }
            });

            // 点击事件 - 显示弹窗
            map.on('click', 'village-fill', function(e) {
                if (!e.features || !e.features.length) return;
                const props = e.features[0].properties;
                
                const html = `
                    <div class="popup-content">
                        <h4>📍 ${props['编号'] || '未知地块'}</h4>
                        <div class="popup-row">
                            <span class="popup-label">经济社</span>
                            <span class="popup-value">${props['经济社'] || '-'}</span>
                        </div>
                        <div class="popup-row">
                            <span class="popup-label">权属人</span>
                            <span class="popup-value">${props['权属人'] || '-'}</span>
                        </div>
                        <div class="popup-row">
                            <span class="popup-label">动迁组</span>
                            <span class="popup-value">${props['动迁组'] || '-'}</span>
                        </div>
                        <div class="popup-row">
                            <span class="popup-label">宗地面积</span>
                            <span class="popup-value">${props['宗地面'] || 0} m²</span>
                        </div>
                        <div class="popup-row">
                            <span class="popup-label">房屋面积</span>
                            <span class="popup-value">${props['房屋面'] || 0} m²</span>
                        </div>
                        <div class="popup-row">
                            <span class="popup-label">签约状态</span>
                            <span class="popup-value">${props['签约情'] || '未登记'}</span>
                        </div>
                        <div class="popup-row">
                            <span class="popup-label">清拆状态</span>
                            <span class="popup-value">${props['清拆情'] || '未登记'}</span>
                        </div>
                    </div>
                `;

                new TMapGL.Popup({ maxWidth: '300px' })
                    .setLngLat(e.lngLat)
                    .setHTML(html)
                    .addTo(map);
            });

            // 悬停效果
            map.on('mouseenter', 'village-fill', function() {
                map.getCanvas().style.cursor = 'pointer';
            });
            map.on('mouseleave', 'village-fill', function() {
                map.getCanvas().style.cursor = '';
            });

            // 自适应到数据范围
            fitToGeoJSON(geojson);
        }

        // 自适应到数据范围
        function fitToGeoJSON(geojson) {
            const bounds = new TMapGL.LngLatBounds();
            geojson.features.forEach(function(f) {
                if (f.geometry && f.geometry.coordinates) {
                    processCoords(f.geometry.coordinates, bounds);
                }
            });
            if (bounds.isEmpty()) return;
            map.fitBounds(bounds, { padding: 50, maxZoom: 17 });
        }

        function processCoords(coords, bounds) {
            if (typeof coords[0] === 'number') {
                bounds.extend(coords);
            } else {
                coords.forEach(function(c) { processCoords(c, bounds); });
            }
        }

        // 渲染侧边面板
        function renderPanel(geojson) {
            const features = geojson.features;
            const total = features.length;
            document.getElementById('total-count').textContent = total;

            // 统计数据
            let signedCount = 0;
            let unsignedCount = 0;
            let unknownCount = 0;
            const economicGroups = {};
            let totalLandArea = 0;
            let totalHouseArea = 0;

            features.forEach(function(f) {
                const p = f.properties;
                const status = p['签约情'] || '';
                if (status === '已签约') signedCount++;
                else if (status === '未签约') unsignedCount++;
                else unknownCount++;

                const group = p['经济社'] || '未分配';
                economicGroups[group] = (economicGroups[group] || 0) + 1;

                totalLandArea += (p['宗地面'] || 0);
                totalHouseArea += (p['房屋面'] || 0);
            });

            // 签约率
            const signedRate = total > 0 ? Math.round((signedCount / total) * 100) : 0;

            // 渲染统计卡片
            let statsHtml = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="value">${total}</div>
                        <div class="label">总地块数</div>
                    </div>
                    <div class="stat-card success">
                        <div class="value">${signedCount}</div>
                        <div class="label">已签约</div>
                    </div>
                    <div class="stat-card warning">
                        <div class="value">${unsignedCount}</div>
                        <div class="label">未签约</div>
                    </div>
                    <div class="stat-card danger">
                        <div class="value">${signedRate}%</div>
                        <div class="label">签约率</div>
                    </div>
                </div>
            `;

            // 图例
            statsHtml += `
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: ${SIGNED_COLOR}"></div>
                        <span>已签约</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: ${UNSIGNED_COLOR}"></div>
                        <span>未签约</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: ${UNKNOWN_COLOR}"></div>
                        <span>状态未知</span>
                    </div>
                </div>
            `;

            // 签约进度饼图
            statsHtml += `
                <div class="chart-section">
                    <h3>📊 签约进度分布</h3>
                    <div class="chart-container" id="chart-progress"></div>
                </div>
            `;

            // 经济社分布柱状图
            statsHtml += `
                <div class="chart-section">
                    <h3>🏢 经济社地块分布</h3>
                    <div class="chart-container" id="chart-groups"></div>
                </div>
            `;

            // 面积统计
            statsHtml += `
                <div class="chart-section">
                    <h3>📐 面积统计</h3>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="value">${(totalLandArea / 10000).toFixed(2)}</div>
                            <div class="label">宗地总面积 (公顷)</div>
                        </div>
                        <div class="stat-card">
                            <div class="value">${(totalHouseArea / 10000).toFixed(2)}</div>
                            <div class="label">房屋总面积 (公顷)</div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('panel-content').innerHTML = statsHtml;

            // 初始化图表
            initCharts(signedCount, unsignedCount, unknownCount, economicGroups);
        }

        // 初始化 ECharts 图表
        function initCharts(signed, unsigned, unknown, groups) {
            // 饼图 - 签约进度
            const chart1Dom = document.getElementById('chart-progress');
            myChart1 = echarts.init(chart1Dom);
            myChart1.setOption({
                tooltip: { trigger: 'item' },
                legend: { orient: 'horizontal', bottom: 0, textStyle: { fontSize: 11 } },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['50%', '45%'],
                    data: [
                        { value: signed, name: '已签约', itemStyle: { color: '#12a150' } },
                        { value: unsigned, name: '未签约', itemStyle: { color: '#2f6bff' } },
                        { value: unknown, name: '未知', itemStyle: { color: '#8a95ab' } }
                    ],
                    label: { fontSize: 11 },
                    emphasis: {
                        itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0,0,0,0.3)' }
                    }
                }]
            });

            // 柱状图 - 经济社分布
            const chart2Dom = document.getElementById('chart-groups');
            // 修复拼写错误：chart2Dem -> chart2Dom
            myChart2 = echarts.init(chart2Dom);
            
            // 排序并取前 10
            const sortedGroups = Object.entries(groups)
                .sort(function(a, b) { return b[1] - a[1]; })
                .slice(0, 10);
            
            myChart2.setOption({
                tooltip: { trigger: 'axis' },
                grid: { left: 10, right: 10, top: 10, bottom: 25 },
                xAxis: { 
                    type: 'category', 
                    data: sortedGroups.map(function(g) { return g[0]; }),
                    axisLabel: { fontSize: 10, rotate: 30 }
                },
                yAxis: { type: 'value', axisLabel: { fontSize: 10 } },
                series: [{
                    type: 'bar',
                    data: sortedGroups.map(function(g) { return g[1]; }),
                    itemStyle: { color: '#2f6bff', borderRadius: [4, 4, 0, 0] },
                    barMaxWidth: 30
                }]
            });

            // 响应式
            window.addEventListener('resize', function() {
                myChart1 && myChart1.resize();
                myChart2 && myChart2.resize();
            });
        }

        // 启动
        initMap();
    </script>
</body>
</html>
