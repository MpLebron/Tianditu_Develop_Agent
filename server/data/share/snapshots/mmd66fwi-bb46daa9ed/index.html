<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市 GDP 数据 3D 柱状图</title>
    <script src="https://api.tianditu.gov.cn/api/v5/js?tk=4043dde46add842282bacc412299311d" type="text/javascript"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
        /* 图例面板 */
        .legend-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            max-width: 280px;
        }
        .legend-panel h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
            border-bottom: 2px solid #1677ff;
            padding-bottom: 8px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            margin-right: 10px;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        .legend-info {
            flex: 1;
        }
        .legend-name {
            font-weight: bold;
            color: #333;
        }
        .legend-value {
            color: #666;
            font-size: 12px;
        }
        /* 提示说明 */
        .tip-box {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 13px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <!-- 图例面板 -->
    <div class="legend-panel">
        <h3>📊 城市 GDP 排行（万亿元）</h3>
        <div id="legend-content"></div>
    </div>
    
    <!-- 操作提示 -->
    <div class="tip-box">
        💡 提示：拖动鼠标旋转视角，滚动缩放，点击柱体查看详情
    </div>

    <script>
        // 城市 GDP 数据（单位：万亿元）
        var cityData = [
            { name: '上海', lng: 121.47, lat: 31.23, gdp: 4.72, color: '#ff4444' },
            { name: '北京', lng: 116.40, lat: 39.90, gdp: 4.38, color: '#44aaff' },
            { name: '深圳', lng: 114.06, lat: 22.54, gdp: 3.46, color: '#44dd44' },
            { name: '广州', lng: 113.26, lat: 23.13, gdp: 3.04, color: '#ffaa00' },
            { name: '重庆', lng: 106.55, lat: 29.56, gdp: 3.01, color: '#aa44ff' },
            { name: '苏州', lng: 120.58, lat: 31.30, gdp: 2.40, color: '#ff6644' },
            { name: '成都', lng: 104.06, lat: 30.67, gdp: 2.20, color: '#44ffaa' },
            { name: '杭州', lng: 120.15, lat: 30.27, gdp: 2.00, color: '#6644ff' },
            { name: '武汉', lng: 114.30, lat: 30.59, gdp: 1.90, color: '#ff44aa' },
            { name: '南京', lng: 118.78, lat: 32.06, gdp: 1.75, color: '#44ffff' }
        ];

        // 按 GDP 降序排序
        cityData.sort(function(a, b) { return b.gdp - a.gdp; });

        // 初始化地图（关键：设置 pitch 倾斜角度才能看到 3D 效果）
        var map = new TMapGL.Map('map', {
            center: [116.0, 32.0],  // 中心点：经度，纬度
            zoom: 5,
            pitch: 55,    // 倾斜角度（必须 > 0 才能看到 3D 效果）
            bearing: -15  // 旋转角度，增强立体感
        });

        // 地图加载完成后添加图层
        map.on('load', function() {
            // 生成图例
            generateLegend();
            
            // 为每个城市创建 3D 柱体
            cityData.forEach(function(city, index) {
                create3DBar(city, index);
            });

            // 绑定点击事件显示详情
            bindClickEvents();
        });

        // 创建 3D 柱体
        function create3DBar(city, index) {
            var size = 0.6;  // 柱体底面宽度（经纬度范围）
            var height = city.gdp * 60000;  // GDP 映射为高度（米）

            // 创建矩形多边形（围绕城市中心点）
            var polygon = {
                type: 'FeatureCollection',
                features: [{
                    type: 'Feature',
                    properties: {
                        name: city.name,
                        gdp: city.gdp,
                        color: city.color
                    },
                    geometry: {
                        type: 'Polygon',
                        coordinates: [[
                            [city.lng - size/2, city.lat - size/2],
                            [city.lng + size/2, city.lat - size/2],
                            [city.lng + size/2, city.lat + size/2],
                            [city.lng - size/2, city.lat + size/2],
                            [city.lng - size/2, city.lat - size/2]  // 闭合多边形
                        ]]
                    }
                }]
            };

            // 添加数据源
            var sourceId = 'city-source-' + index;
            map.addSource(sourceId, {
                type: 'geojson',
                data: polygon
            });

            // 添加 3D 柱状图层
            var layerId = 'city-bar-' + index;
            map.addLayer({
                id: layerId,
                type: 'fill-extrusion',
                source: sourceId,
                paint: {
                    'fill-extrusion-color': city.color,
                    'fill-extrusion-height': height,      // 拉伸高度（米）
                    'fill-extrusion-base': 0,             // 底部高度
                    'fill-extrusion-opacity': 0.85,       // 透明度
                    'fill-extrusion-vertical-gradient': true  // 垂直渐变
                }
            });
        }

        // 生成图例
        function generateLegend() {
            var content = document.getElementById('legend-content');
            var html = '';
            
            cityData.forEach(function(city) {
                html += '<div class="legend-item">';
                html += '<div class="legend-color" style="background: ' + city.color + '"></div>';
                html += '<div class="legend-info">';
                html += '<div class="legend-name">' + city.name + '</div>';
                html += '<div class="legend-value">GDP: ' + city.gdp + ' 万亿元</div>';
                html += '</div></div>';
            });
            
            content.innerHTML = html;
        }

        // 绑定点击事件
        function bindClickEvents() {
            cityData.forEach(function(city, index) {
                var layerId = 'city-bar-' + index;
                
                // 鼠标悬停效果
                map.on('mouseenter', layerId, function() {
                    map.getCanvas().style.cursor = 'pointer';
                    // 高亮当前柱体
                    map.setPaintProperty(layerId, 'fill-extrusion-opacity', 1.0);
                });
                
                map.on('mouseleave', layerId, function() {
                    map.getCanvas().style.cursor = '';
                    // 恢复透明度
                    map.setPaintProperty(layerId, 'fill-extrusion-opacity', 0.85);
                });
                
                // 点击显示详情
                map.on('click', layerId, function(e) {
                    if (!e.features || !e.features.length) return;
                    
                    var props = e.features[0].properties;
                    var html = '<div style="padding: 10px;">';
                    html += '<h3 style="margin: 0 0 10px 0; color: ' + props.color + ';">' + props.name + '</h3>';
                    html += '<p style="margin: 5px 0;"><strong>GDP:</strong> ' + props.gdp + ' 万亿元</p>';
                    html += '<p style="margin: 5px 0;"><strong>排名:</strong> 第 ' + (index + 1) + ' 名</p>';
                    html += '<p style="margin: 5px 0; color: #666; font-size: 12px;">柱体高度反映经济规模</p>';
                    html += '</div>';
                    
                    new TMapGL.Popup({ maxWidth: '250px' })
                        .setLngLat(e.lngLat)
                        .setHTML(html)
                        .addTo(map);
                });
            });
        }
    </script>
</body>
</html>
